[server]
enable_gzip = true

[analytics]
reporting_enabled    = false
check_for_updates    = true
check_for_plugin_updates = true
feedback_links_enabled = false

[security]
disable_gravatar          = true
# Set cookie_secure = true when serving over HTTPS.
cookie_secure             = false
cookie_samesite           = lax
# Prevent embedding Grafana in an iframe on another origin.
allow_embedding           = false
# Disable initial admin password prompt; password comes from env var.
disable_initial_admin_creation = false

[users]
allow_sign_up      = false
allow_org_create   = false
auto_assign_org    = true
auto_assign_org_id = 1
auto_assign_org_role = Viewer

[auth]
disable_login_form = false

[auth.anonymous]
enabled = false

[auth.basic]
enabled = true

[log]
mode  = console
level = info

[alerting]
enabled = false  # Use Grafana Alerting (unified) instead

[unified_alerting]
enabled = true

[dashboards]
default_home_dashboard_path =

[panels]
disable_sanitize_html = false

[feature_toggles]
enable =
