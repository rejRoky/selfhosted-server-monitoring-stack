global:
  resolve_timeout: 5m

  # ── SMTP (email) ──────────────────────────────────────────────────────────
  # Edit these values before going to production.
  # alertmanager.yml is read directly — shell ${VAR} syntax is NOT supported.
  smtp_smarthost: "smtp.example.com:587"
  smtp_from: "alerts@example.com"
  smtp_auth_username: "alerts@example.com"
  smtp_auth_password: "changeme"
  smtp_require_tls: true

# ── Routing tree ───────────────────────────────────────────────────────────
route:
  group_by: ["alertname", "severity", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    - match:
        severity: critical
      receiver: critical-alerts
      group_wait: 10s
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: warning-alerts
      repeat_interval: 4h

    - match_re:
        alertname: "^(UptimeKumaDown|GrafanaDown|NginxDown|PrometheusConfigReloadFailed)$"
      receiver: critical-alerts
      group_wait: 5s
      repeat_interval: 30m

# ── Inhibition rules ───────────────────────────────────────────────────────
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["instance", "job"]

  - source_match:
      alertname: NginxDown
    target_match_re:
      alertname: "^(UptimeKumaDown|GrafanaDown)$"

# ── Receivers ──────────────────────────────────────────────────────────────
receivers:

  - name: default

  - name: critical-alerts
    email_configs:
      - to: "oncall@example.com"
        send_resolved: true
        headers:
          Subject: "[CRITICAL] {{ .GroupLabels.alertname }} - {{ .CommonAnnotations.summary }}"

    # Uncomment and fill in your Slack webhook URL to enable Slack alerts.
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/REPLACE/ME"
    #     channel: "#monitoring-alerts"
    #     send_resolved: true
    #     icon_emoji: ":fire:"
    #     color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
    #     title: '{{ if eq .Status "firing" }}:red_circle: CRITICAL{{ else }}:large_green_circle: RESOLVED{{ end }} - {{ .GroupLabels.alertname }}'
    #     text: |
    #       {{ range .Alerts }}*{{ .Annotations.summary }}*
    #       {{ .Annotations.description }}
    #       {{ end }}

  - name: warning-alerts
    email_configs:
      - to: "oncall@example.com"
        send_resolved: true
        headers:
          Subject: "[WARNING] {{ .GroupLabels.alertname }} - {{ .CommonAnnotations.summary }}"
