# ── Upstreams ──────────────────────────────────────────────────────────────
upstream uptime_kuma  { server uptime-kuma:3001;  keepalive 32; }
upstream grafana      { server grafana:3000;       keepalive 32; }
upstream prometheus   { server prometheus:9090;    keepalive 16; }
upstream alertmanager { server alertmanager:9093;  keepalive 16; }

# ── Common proxy header snippet (reused via include in each location) ───────
# Nginx doesn't support named snippet blocks, so the headers are repeated
# inline per location below.  Keeping them explicit aids readability.

# ═══════════════════════════════════════════════════════════════════════════
# HTTP server — all services behind a single port
# ═══════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name _;

    # ── Global security headers ───────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"             always;
    add_header X-Content-Type-Options "nosniff"                always;
    add_header X-XSS-Protection       "1; mode=block"          always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Load-balancer / readiness probe ──────────────────────────────────
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Uptime Kuma – public status page ─────────────────────────────────
    # Accessible to everyone.  Uptime Kuma manages its own login for the
    # admin panel at /dashboard.
    location / {
        limit_req zone=public burst=40 nodelay;

        proxy_pass         http://uptime_kuma;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (required by Uptime Kuma's real-time UI)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }

    # ── Grafana – dashboards ──────────────────────────────────────────────
    # Grafana enforces its own authentication.  The sub-path /grafana is
    # configured via GF_SERVER_ROOT_URL / GF_SERVER_SERVE_FROM_SUB_PATH.
    location /grafana/ {
        limit_req zone=admin burst=20 nodelay;

        proxy_pass         http://grafana;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (needed for Grafana Live / alerting updates)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    # ── Prometheus – protected by HTTP basic auth ─────────────────────────
    # rewrite strips /prometheus prefix; Prometheus serves at / internally
    # (--web.route-prefix=/) while advertising /prometheus externally.
    # In production, also restrict by IP: allow 10.0.0.0/8; deny all;
    location /prometheus/ {
        limit_req zone=admin burst=10 nodelay;

        auth_basic           "Prometheus -- restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;

        rewrite              ^/prometheus(/.*) $1 break;
        proxy_pass         http://prometheus;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Alertmanager – protected by HTTP basic auth ───────────────────────
    location /alertmanager/ {
        limit_req zone=admin burst=10 nodelay;

        auth_basic           "Alertmanager -- restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;

        rewrite              ^/alertmanager(/.*) $1 break;
        proxy_pass         http://alertmanager;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

